<!doctype html>
<html lang="fr" xml:lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary Meta Tags — overridden per-page by react-helmet-async -->
    <title>Elie Ageron | Web Design & Conversion Optimization</title>
    <meta name="title" content="Elie Ageron | Web Design & Conversion Optimization" />
    <meta name="description" content="Premium web design by Elie Ageron. Affordable, reliable websites that transform visitors into paying clients." />
    <meta name="author" content="Elie Ageron" />
    <meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1" />
    <meta name="keywords" content="Elie Ageron, web design, web designer, creation site web, website design, landing page, conversion optimization, France, Creation site internet Haute-Savoie, Webdesign Annecy, Expert conversion, Refonte site professionnel, High conversion web design, Lead generation specialist, SEO optimized websites, Premium UI/UX" />

    <!-- Geo Tags (static, identical on every page) -->
    <meta name="geo.region" content="FR-74" />
    <meta name="geo.placename" content="Haute-Savoie, France" />
    <meta name="geo.position" content="45.8992;6.1294" />
    <meta name="ICBM" content="45.8992, 6.1294" />

    <!-- Favicons & App Icons -->
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/icons/apple-touch-icon.png" />
    <link rel="apple-touch-icon" sizes="152x152" href="/icons/icon-152x152.png" />
    <link rel="apple-touch-icon" sizes="144x144" href="/icons/icon-144x144.png" />
    <link rel="apple-touch-icon" sizes="120x120" href="/icons/icon-120x120.png" />
    <link rel="apple-touch-icon" sizes="76x76" href="/icons/icon-76x76.png" />

    <!-- Theme color -->
    <meta name="theme-color" content="#c4516b" />

    <!-- Preconnect for performance -->
    <link rel="preconnect" href="https://api.fontshare.com" crossorigin />
    <link rel="preconnect" href="https://cdn.fontshare.com" crossorigin />

    <!-- Preload critical font CSS -->
    <link rel="preload" href="https://api.fontshare.com/v2/css?f[]=general-sans@400,500,600,700&display=swap" as="style" />

    <!-- Non-render-blocking font loading -->
    <link href="https://api.fontshare.com/v2/css?f[]=general-sans@400,500,600,700&display=swap" rel="stylesheet" media="print" onload="this.media='all'" />
    <noscript><link href="https://api.fontshare.com/v2/css?f[]=general-sans@400,500,600,700&display=swap" rel="stylesheet" /></noscript>

    <!-- DNS Prefetch for Calendly widget -->
    <link rel="dns-prefetch" href="https://calendly.com" />
    <link rel="preconnect" href="https://calendly.com" crossorigin />

    <!-- OG tags, Twitter cards, canonical, hreflang and JSON-LD are managed -->
    <!-- per-page by react-helmet-async components + react-snap prerendering   -->
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
