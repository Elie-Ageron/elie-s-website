name: Build & Deploy to IONOS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build
        run: bunx vite build

      - name: Install Chrome for react-snap
        run: |
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable

      - name: Prerender with react-snap
        run: |
          node -e "const fs=require('fs'); const p=JSON.parse(fs.readFileSync('./package.json','utf8')); p.reactSnap.puppeteerExecutablePath='/usr/bin/google-chrome'; fs.writeFileSync('./package.json', JSON.stringify(p,null,2));"
          bunx react-snap

      - name: Deploy via FTP to IONOS
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./dist/
          server-dir: /htdocs/
